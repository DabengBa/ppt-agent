<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Primary orange gradient -->
    <linearGradient id="orangeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="100%" stop-color="#FF8C33" />
    </linearGradient>

    <!-- Dark background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#2A2A2A" />
    </linearGradient>

    <!-- Subtle radial glow behind title -->
    <radialGradient id="glowGradient" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.08" />
      <stop offset="60%" stop-color="#FF6900" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0" />
    </radialGradient>

    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Soft glow for accent elements -->
    <filter id="accentGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Horizontal line gradient fade -->
    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0" />
      <stop offset="20%" stop-color="#FF6900" stop-opacity="1" />
      <stop offset="80%" stop-color="#FF6900" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0" />
    </linearGradient>

    <!-- Orange accent gradient for left bar -->
    <linearGradient id="accentBarGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="50%" stop-color="#FF8C33" />
      <stop offset="100%" stop-color="#FF6900" />
    </linearGradient>
  </defs>

  <!-- ========================================== -->
  <!-- BACKGROUND: Dark with subtle texture       -->
  <!-- ========================================== -->
  <rect width="1280" height="720" fill="url(#bgGradient)" />

  <!-- Subtle radial glow behind center -->
  <rect width="1280" height="720" fill="url(#glowGradient)" />

  <!-- Geometric accent lines (subtle grid texture) -->
  <line x1="0" y1="180" x2="1280" y2="180" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  <line x1="320" y1="0" x2="320" y2="720" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
  <line x1="960" y1="0" x2="960" y2="720" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />

  <!-- ========================================== -->
  <!-- BENTO GRID LAYOUT                          -->
  <!-- ========================================== -->

  <!-- LEFT ACCENT BAR: Orange vertical strip (Bento card 1) -->
  <rect x="0" y="0" width="8" height="720" fill="url(#accentBarGradient)" />

  <!-- TOP-LEFT: Brand badge card -->
  <rect x="48" y="40" width="200" height="56" rx="12" fill="#FF6900" fill-opacity="0.12" />
  <rect x="48" y="40" width="200" height="56" rx="12" fill="none" stroke="#FF6900" stroke-opacity="0.25" stroke-width="1" />

  <!-- Xiaomi "Mi" stylized mark inside badge -->
  <rect x="64" y="52" width="32" height="32" rx="6" fill="#FF6900" />
  <text x="80" y="75" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Mi</text>

  <!-- Brand name next to mark -->
  <text x="112" y="74" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#FF6900" letter-spacing="2">XIAOMI</text>

  <!-- ========================================== -->
  <!-- MAIN CONTENT CARD (Bento hero card)        -->
  <!-- ========================================== -->
  <rect x="48" y="136" width="880" height="448" rx="20" fill="#FFFFFF" fill-opacity="0.04" filter="url(#cardShadow)" />
  <rect x="48" y="136" width="880" height="448" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" />

  <!-- Decorative orange corner accent (top-left of card) -->
  <path d="M 48 156 L 48 136 Q 48 136 68 136 L 128 136" fill="none" stroke="#FF6900" stroke-width="3" stroke-linecap="round" />

  <!-- Main Title -->
  <text x="96" y="260" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="4">新一代小米SU7</text>

  <!-- Orange accent underline beneath title -->
  <rect x="96" y="280" width="160" height="5" rx="2.5" fill="#FF6900" />

  <!-- Subtitle -->
  <text x="96" y="340" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="400" fill="#FFFFFF" fill-opacity="0.7" letter-spacing="2">造车5年最新答卷</text>

  <!-- Subtitle keywords with separator dots -->
  <text x="96" y="395" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#FF6900" letter-spacing="3">
    <tspan fill="#FF6900">更强</tspan>
    <tspan fill="#FFFFFF" fill-opacity="0.3" dx="8">|</tspan>
    <tspan fill="#FF6900" dx="8">更安全</tspan>
    <tspan fill="#FFFFFF" fill-opacity="0.3" dx="8">|</tspan>
    <tspan fill="#FF6900" dx="8">更智能</tspan>
  </text>

  <!-- Horizontal divider line -->
  <line x1="96" y1="435" x2="500" y2="435" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" />

  <!-- Author and date -->
  <text x="96" y="475" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" fill-opacity="0.4" letter-spacing="2">小米汽车</text>
  <text x="96" y="510" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" fill-opacity="0.3" letter-spacing="1">2026年3月19日</text>

  <!-- Decorative orange corner accent (bottom-right of card) -->
  <path d="M 928 564 L 928 584 Q 928 584 908 584 L 848 584" fill="none" stroke="#FF6900" stroke-width="3" stroke-linecap="round" />

  <!-- ========================================== -->
  <!-- RIGHT SIDE BENTO CARDS                     -->
  <!-- ========================================== -->

  <!-- Right top card: Key spec highlight 1 -->
  <rect x="948" y="136" width="284" height="140" rx="16" fill="#FF6900" fill-opacity="0.1" />
  <rect x="948" y="136" width="284" height="140" rx="16" fill="none" stroke="#FF6900" stroke-opacity="0.2" stroke-width="1" />
  <text x="1090" y="195" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="800" fill="#FF6900" text-anchor="middle">902km</text>
  <text x="1090" y="228" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">CLTC 同级最长续航</text>

  <!-- Right middle card: Key spec highlight 2 -->
  <rect x="948" y="296" width="284" height="140" rx="16" fill="#FFFFFF" fill-opacity="0.04" />
  <rect x="948" y="296" width="284" height="140" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" />
  <text x="1090" y="355" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle">3.08s</text>
  <text x="1090" y="388" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">零百加速 Max</text>

  <!-- Right bottom card: Key spec highlight 3 -->
  <rect x="948" y="456" width="284" height="128" rx="16" fill="#FFFFFF" fill-opacity="0.04" />
  <rect x="948" y="456" width="284" height="128" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" />
  <text x="1090" y="510" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" text-anchor="middle">700 TOPS</text>
  <text x="1090" y="543" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">全系标配智驾算力</text>

  <!-- ========================================== -->
  <!-- BOTTOM BAR: Price anchor + tagline         -->
  <!-- ========================================== -->
  <rect x="48" y="620" width="1184" height="64" rx="14" fill="#FF6900" fill-opacity="0.08" />
  <rect x="48" y="620" width="1184" height="64" rx="14" fill="none" stroke="#FF6900" stroke-opacity="0.15" stroke-width="1" />

  <!-- Price -->
  <text x="96" y="660" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#FF6900" letter-spacing="1">21.99万起</text>

  <!-- Separator -->
  <line x1="260" y1="636" x2="260" y2="668" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" />

  <!-- Tagline items -->
  <text x="300" y="658" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" fill-opacity="0.45" letter-spacing="1">Standard 21.99万</text>
  <circle cx="480" cy="652" r="2" fill="#FF6900" fill-opacity="0.5" />
  <text x="500" y="658" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" fill-opacity="0.45" letter-spacing="1">Pro 24.99万</text>
  <circle cx="650" cy="652" r="2" fill="#FF6900" fill-opacity="0.5" />
  <text x="670" y="658" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" fill-opacity="0.45" letter-spacing="1">Max 30.39万</text>

  <!-- Right side: launch date CTA -->
  <text x="1184" y="658" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#FF6900" fill-opacity="0.7" text-anchor="end" letter-spacing="1">上市即交付</text>

  <!-- ========================================== -->
  <!-- TOP-RIGHT: Minimal page indicator          -->
  <!-- ========================================== -->
  <text x="1208" y="68" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" fill-opacity="0.2" text-anchor="end" letter-spacing="1">01 / 12</text>

  <!-- ========================================== -->
  <!-- BOTTOM-RIGHT: Decorative dot pattern       -->
  <!-- ========================================== -->
  <g fill="#FF6900" fill-opacity="0.08">
    <circle cx="1180" cy="100" r="2" />
    <circle cx="1196" cy="100" r="2" />
    <circle cx="1212" cy="100" r="2" />
    <circle cx="1228" cy="100" r="2" />
    <circle cx="1180" cy="116" r="2" />
    <circle cx="1196" cy="116" r="2" />
    <circle cx="1212" cy="116" r="2" />
    <circle cx="1228" cy="116" r="2" />
  </g>

</svg>