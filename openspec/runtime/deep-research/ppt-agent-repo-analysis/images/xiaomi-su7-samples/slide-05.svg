<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- Icon glow filter -->
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FF6900" flood-opacity="0.3"/>
    </filter>
    <!-- Title glow -->
    <filter id="titleGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF6900" flood-opacity="0.15"/>
    </filter>
    <!-- Subtle inner highlight for cards -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <!-- Orange gradient for accent elements -->
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C33"/>
      <stop offset="100%" stop-color="#FF6900"/>
    </linearGradient>
    <!-- Top bar gradient -->
    <linearGradient id="topBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6900"/>
      <stop offset="60%" stop-color="#FF8C33"/>
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#1A1A1A"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.03">
    <line x1="320" y1="0" x2="320" y2="720" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="720" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#topBarGrad)"/>

  <!-- Section label -->
  <rect x="48" y="28" width="8" height="8" rx="4" fill="#FF6900"/>
  <text x="64" y="36" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="600" letter-spacing="2">PART 2 / STANDARD FEATURES</text>

  <!-- Title area -->
  <text x="48" y="80" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" filter="url(#titleGlow)">12项旗舰配置，全系标配</text>
  <text x="48" y="110" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#999999">21.99万起，一项都不少</text>

  <!-- Orange accent line under title -->
  <rect x="48" y="122" width="80" height="3" rx="1.5" fill="#FF6900"/>

  <!-- ====== 4x3 BENTO GRID ====== -->
  <!-- Grid config: x_start=48, gap=16, card_width=284, card_height=148 -->
  <!-- Row y positions: 148, 312, 476 -->
  <!-- Col x positions: 48, 348, 648, 948 -->

  <!-- === ROW 1 === -->

  <!-- Card 1: Laser Radar -->
  <g filter="url(#cardShadow)">
    <rect x="48" y="148" width="284" height="148" rx="12" fill="url(#cardGrad)"/>
    <rect x="48" y="148" width="284" height="148" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
  </g>
  <!-- Icon: scanning radar dish shape -->
  <g filter="url(#iconGlow)" transform="translate(72, 172)">
    <circle cx="20" cy="20" r="20" fill="#FF6900" opacity="0.15"/>
    <path d="M20 8 L20 20 M12 14 A12 12 0 0 1 28 14 M6 10 A18 18 0 0 1 34 10" stroke="#FF6900" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="3" fill="#FF6900"/>
  </g>
  <text x="72" y="228" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">激光雷达</text>
  <text x="72" y="250" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777">LiDAR</text>
  <text x="72" y="270" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#555555">同价位首次全系标配</text>

