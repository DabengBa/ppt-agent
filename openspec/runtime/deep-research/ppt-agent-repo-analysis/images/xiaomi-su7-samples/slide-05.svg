    <rect x="10" y="12" width="20" height="16" rx="2" stroke="#FF6900" stroke-width="2" fill="none"/>
    <rect x="16" y="9" width="8" height="3" rx="1" fill="#FF6900"/>
    <line x1="15" y1="18" x2="25" y2="18" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="15" y1="22" x2="25" y2="22" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="15" y1="26" x2="25" y2="26" stroke="#FF6900" stroke-width="1.5"/>
