  <g filter="url(#cardShadow)">
    <rect x="48" y="312" width="284" height="148" rx="12" fill="url(#cardGrad)"/>
    <rect x="48" y="312" width="284" height="148" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
  </g>
  <!-- Icon: motor/lightning bolt -->
