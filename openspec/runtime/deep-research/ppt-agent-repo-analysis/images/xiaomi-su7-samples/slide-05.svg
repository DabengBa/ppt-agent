  <text x="72" y="414" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777">22,000rpm HyperMotor</text>
  <text x="72" y="434" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#555555">SiC逆变器极致效率</text>

