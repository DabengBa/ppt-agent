  <g filter="url(#cardShadow)">
    <rect x="348" y="148" width="284" height="148" rx="12" fill="url(#cardGrad)"/>
    <rect x="348" y="148" width="284" height="148" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
  </g>
  <!-- Icon: concentric wave arcs -->
  <g filter="url(#iconGlow)" transform="translate(372, 172)">
    <circle cx="20" cy="20" r="20" fill="#FF6900" opacity="0.15"/>
    <path d="M14 26 L20 14 L26 26" stroke="#FF6900" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 20 A14 14 0 0 0 30 20" stroke="#FF6900" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M6 18 A18 18 0 0 0 34 18" stroke="#FF6900" stroke-width="1" fill="none" opacity="0.3"/>
  </g>
  <text x="372" y="228" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4D毫米波雷达</text>
  <text x="372" y="250" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777">4D mmWave Radar</text>
  <text x="372" y="270" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#555555">全方位环境感知</text>

  <!-- Card 3: 700TOPS Thor Chip -->
  <g filter="url(#cardShadow)">
    <rect x="648" y="148" width="284" height="148" rx="12" fill="url(#cardGrad)"/>
    <rect x="648" y="148" width="284" height="148" rx="12" fill="none" stroke="#333333" stroke-width="1"/>
