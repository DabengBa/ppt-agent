  <text x="108" y="693" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#FF6900" text-anchor="middle">12 = 全系标配</text>

  <!-- Page number -->
