    <circle cx="20" cy="20" r="20" fill="#FF6900" opacity="0.15"/>
    <path d="M8 26 L14 16 L20 20 L26 12 L32 22" stroke="#FF6900" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10" cy="26" r="2.5" fill="#FF6900"/>
    <circle cx="30" cy="22" r="2.5" fill="#FF6900"/>
  </g>
  <text x="372" y="392" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">蛟龙底盘</text>
  <text x="372" y="414" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777">Dragon Chassis</text>
  <text x="372" y="434" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#555555">前双叉臂+后五连杆</text>

