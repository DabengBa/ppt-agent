    <path d="M20 8 L30 13 L30 22 C30 28 25 33 20 34 C15 33 10 28 10 22 L10 13 Z" stroke="#FF6900" stroke-width="2" fill="none"/>
    <path d="M16 20 L19 23 L25 16" stroke="#FF6900" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="672" y="392" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2200MPa钢结构</text>
