    <circle cx="20" cy="20" r="20" fill="#FF6900" opacity="0.15"/>
    <rect x="12" y="12" width="16" height="16" rx="2" stroke="#FF6900" stroke-width="2" fill="none"/>
    <line x1="16" y1="8" x2="16" y2="12" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="20" y1="8" x2="20" y2="12" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="24" y1="8" x2="24" y2="12" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="16" y1="28" x2="16" y2="32" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="20" y1="28" x2="20" y2="32" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="24" y1="28" x2="24" y2="32" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="8" y1="16" x2="12" y2="16" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="8" y1="20" x2="12" y2="20" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="8" y1="24" x2="12" y2="24" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="28" y1="16" x2="32" y2="16" stroke="#FF6900" stroke-width="1.5"/>
    <line x1="28" y1="20" x2="32" y2="20" stroke="#FF6900" stroke-width="1.5"/>
