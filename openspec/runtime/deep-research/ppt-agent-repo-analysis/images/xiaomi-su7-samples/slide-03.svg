  <!-- Spec: Range - HIGHLIGHTED -->
  <text x="493" y="332" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="600">CLTC 续航</text>
  <g filter="url(#proGlow)">
