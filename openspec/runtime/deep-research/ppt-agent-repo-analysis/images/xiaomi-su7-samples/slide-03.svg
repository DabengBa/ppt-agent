  <text x="248" y="637" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777" font-weight="500">转速</text>
  <text x="248" y="654" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FF6900" font-weight="700">22,000 rpm</text>

  <!-- Separator dot -->
