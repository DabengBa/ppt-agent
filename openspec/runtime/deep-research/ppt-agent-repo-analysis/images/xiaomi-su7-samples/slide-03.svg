  <text x="640" y="252" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">24.99</text>
  <text x="640" y="275" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#888888" text-anchor="middle">万元起</text>

