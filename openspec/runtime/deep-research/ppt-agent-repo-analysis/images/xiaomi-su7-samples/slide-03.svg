  <!-- Spec: Acceleration - HIGHLIGHTED -->
  <text x="887" y="384" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="600">0-100 km/h</text>
  <g filter="url(#maxGlow)">
