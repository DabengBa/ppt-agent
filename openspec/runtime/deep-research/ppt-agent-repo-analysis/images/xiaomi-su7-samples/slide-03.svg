  </g>
  <!-- Accel bar background -->
  <rect x="887" y="396" width="293" height="4" rx="2" fill="#3D2015"/>
  <!-- Accel bar fill (best = 100%) -->
  <rect x="887" y="396" width="293" height="4" rx="2" fill="url(#accentGrad)"/>
  <!-- Standout label -->
  <rect x="1078" y="406" width="102" height="20" rx="10" fill="#FF6900" opacity="0.15"/>
  <text x="1129" y="420" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#FF6900" text-anchor="middle" font-weight="600">性能怪兽</text>

  <!-- Spec: Platform - HIGHLIGHTED -->
  <text x="887" y="456" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="600">平台电压</text>
  <text x="1180" y="456" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FF6900" text-anchor="end">897<tspan font-size="14"> V</tspan></text>
  <!-- Voltage bar background -->
