  <text x="493" y="404" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">0-100 km/h</text>
  <text x="787" y="404" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">5.7<tspan font-size="14" fill="#888888"> s</tspan></text>
  <!-- Accel bar background -->
  <rect x="493" y="416" width="294" height="4" rx="2" fill="#3D3020"/>
  <!-- Accel bar fill (3.08/5.7 = 54%) -->
  <rect x="493" y="416" width="159" height="4" rx="2" fill="#666666"/>

  <!-- Spec: Platform -->
  <text x="493" y="456" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">平台电压</text>
  <text x="787" y="456" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">752<tspan font-size="14" fill="#888888"> V</tspan></text>
  <!-- Voltage bar background -->
  <rect x="493" y="468" width="294" height="4" rx="2" fill="#3D3020"/>
  <!-- Voltage bar fill (752/897 = ~84%) -->
  <rect x="493" y="468" width="246" height="4" rx="2" fill="#666666"/>

  <!-- Value badge -->
  <rect x="554" y="490" width="173" height="30" rx="15" fill="none" stroke="#FF6900" stroke-width="1" opacity="0.5"/>
  <text x="640" y="510" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" text-anchor="middle">续航 + 均衡最优选</text>

  <!-- Highlight tag for Pro -->
  <rect x="554" y="530" width="173" height="26" rx="13" fill="#3D2A10"/>
  <text x="640" y="548" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#FF8C33" text-anchor="middle" font-weight="500">空气弹簧 + CDC减振</text>


  <!-- ===== CARD 3: MAX ===== -->
  <g filter="url(#cardShadow)">
    <rect x="847" y="160" width="373" height="430" rx="12" fill="url(#cardMax)"/>
    <!-- Top accent bar -->
    <rect x="847" y="160" width="373" height="4" rx="2" fill="#FF6900" opacity="0.7"/>
  </g>

  <!-- Performance badge -->
  <rect x="965" y="148" width="96" height="22" rx="11" fill="#CC5500"/>
  <text x="1013" y="163" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="1">性能旗舰</text>

  <!-- Trim name -->
  <text x="1033" y="205" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FF6900" text-anchor="middle" font-weight="600" letter-spacing="3">MAX</text>

