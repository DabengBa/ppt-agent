  <text x="1033" y="252" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">30.39</text>
  <text x="1033" y="275" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#888888" text-anchor="middle">万元起</text>

  <!-- Divider -->
  <line x1="887" y1="295" x2="1180" y2="295" stroke="#3D2015" stroke-width="1"/>

  <!-- Spec: Range -->
  <text x="887" y="332" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">CLTC 续航</text>
  <text x="1180" y="332" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">835<tspan font-size="14" fill="#888888"> km</tspan></text>
