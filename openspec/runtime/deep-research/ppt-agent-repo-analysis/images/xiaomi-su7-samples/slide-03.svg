  <!-- Value badge -->
  <rect x="947" y="490" width="173" height="30" rx="15" fill="none" stroke="#FF6900" stroke-width="1" opacity="0.4"/>
  <text x="1033" y="510" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#DDAAAA" text-anchor="middle">双电机 508kW / 681hp</text>

  <!-- Highlight tag for Max -->
