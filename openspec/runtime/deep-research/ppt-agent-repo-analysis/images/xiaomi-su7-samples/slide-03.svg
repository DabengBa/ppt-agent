  <text x="100" y="654" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#CCCCCC" font-weight="600">V6s Plus 电机</text>

  <!-- Separator dot -->
