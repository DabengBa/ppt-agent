<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <!-- Highlight glow for Pro range -->
    <filter id="proGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF6900" flood-opacity="0.4"/>
    </filter>
    <!-- Highlight glow for Max acceleration -->
    <filter id="maxGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF6900" flood-opacity="0.4"/>
    </filter>
    <!-- Subtle gradient for background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <!-- Card gradient Standard -->
    <linearGradient id="cardStd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <!-- Card gradient Pro -->
    <linearGradient id="cardPro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2015"/>
      <stop offset="100%" stop-color="#1E1A14"/>
    </linearGradient>
    <!-- Card gradient Max -->
    <linearGradient id="cardMax" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1A15"/>
      <stop offset="100%" stop-color="#1E1410"/>
    </linearGradient>
    <!-- Orange accent gradient for highlight bars -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6900"/>
      <stop offset="100%" stop-color="#FF8C33"/>
    </linearGradient>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#FF6900"/>

  <!-- ========== HEADER AREA ========== -->
  <!-- Section tag -->
  <rect x="60" y="28" width="120" height="24" rx="4" fill="#FF6900" opacity="0.15"/>
  <text x="120" y="45" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="600" text-anchor="middle" letter-spacing="1">Part 1 / 极致参数</text>

  <!-- Title -->
  <text x="60" y="95" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="1">三款车型，覆盖20-30万全段位</text>

  <!-- Subtitle -->
  <text x="60" y="124" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#888888" letter-spacing="2">Standard · Pro · Max — 每一款都是旗舰</text>

  <!-- Accent underline -->
  <rect x="60" y="136" width="80" height="3" rx="1.5" fill="#FF6900"/>

  <!-- ========== THREE-COLUMN BENTO GRID ========== -->
  <!-- Grid: 3 cards, 20px gap, 60px side margins -->
  <!-- Card width: (1280 - 60 - 60 - 40) / 3 = 373.33 -->
  <!-- Card 1: x=60   Card 2: x=453.33   Card 3: x=846.67 -->

  <!-- ===== CARD 1: STANDARD ===== -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="160" width="373" height="430" rx="12" fill="url(#cardStd)"/>
    <!-- Top accent bar -->
    <rect x="60" y="160" width="373" height="4" rx="2" fill="#666666"/>
  </g>

  <!-- Trim name -->
  <text x="246" y="205" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="middle" font-weight="500" letter-spacing="3">STANDARD</text>

  <!-- Price -->
  <text x="246" y="252" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">21.99</text>
  <text x="246" y="275" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#888888" text-anchor="middle">万元起</text>

  <!-- Divider -->
  <line x1="100" y1="295" x2="393" y2="295" stroke="#333333" stroke-width="1"/>

  <!-- Spec: Range -->
  <text x="100" y="332" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">CLTC 续航</text>
  <text x="393" y="332" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">720<tspan font-size="14" fill="#888888"> km</tspan></text>
  <!-- Range bar background -->
  <rect x="100" y="344" width="293" height="4" rx="2" fill="#333333"/>
  <!-- Range bar fill (720/902 = ~80%) -->
  <rect x="100" y="344" width="234" height="4" rx="2" fill="#666666"/>

  <!-- Spec: Acceleration -->
  <text x="100" y="384" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">0-100 km/h</text>
  <text x="393" y="384" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">5.3<tspan font-size="14" fill="#888888"> s</tspan></text>
  <!-- Accel bar background -->
  <rect x="100" y="396" width="293" height="4" rx="2" fill="#333333"/>
  <!-- Accel bar fill (inverted: lower is better, 3.08/5.3 = 58% → show 58%) -->
  <rect x="100" y="396" width="170" height="4" rx="2" fill="#666666"/>

  <!-- Spec: Platform -->
  <text x="100" y="436" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#777777" font-weight="500">平台电压</text>
  <text x="393" y="436" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end">752<tspan font-size="14" fill="#888888"> V</tspan></text>
  <!-- Voltage bar background -->
  <rect x="100" y="448" width="293" height="4" rx="2" fill="#333333"/>
  <!-- Voltage bar fill (752/897 = ~84%) -->
  <rect x="100" y="448" width="246" height="4" rx="2" fill="#666666"/>

  <!-- Value badge -->
  <rect x="160" y="475" width="173" height="30" rx="15" fill="none" stroke="#555555" stroke-width="1"/>
  <text x="246" y="495" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">同价位性价比之王</text>

  <!-- Highlight tag for Standard: value positioning -->
  <rect x="160" y="520" width="173" height="26" rx="13" fill="#333333"/>
  <text x="246" y="538" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle" font-weight="500">700 TOPS 智驾算力</text>


  <!-- ===== CARD 2: PRO ===== -->
  <g filter="url(#cardShadow)">
    <rect x="453" y="160" width="374" height="430" rx="12" fill="url(#cardPro)"/>
