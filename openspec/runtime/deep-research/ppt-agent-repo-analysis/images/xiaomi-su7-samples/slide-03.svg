  <text x="1033" y="548" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#FF8C33" text-anchor="middle" font-weight="500">5.2C 快充 | 897V</text>


  <!-- ========== BOTTOM FOOTER BAR ========== -->
