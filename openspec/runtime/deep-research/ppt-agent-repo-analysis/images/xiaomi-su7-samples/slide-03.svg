  <text x="615" y="163" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="1">推荐</text>

  <!-- Trim name -->
  <text x="640" y="205" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FF6900" text-anchor="middle" font-weight="600" letter-spacing="3">PRO</text>

