  <text x="386" y="637" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#777777" font-weight="500">逆变器</text>
  <text x="386" y="654" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#CCCCCC" font-weight="600">SiC 碳化硅</text>

