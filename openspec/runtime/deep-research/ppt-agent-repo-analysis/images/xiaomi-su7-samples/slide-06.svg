<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#1E1E1E" />
    </linearGradient>

    <!-- Orange bar gradient -->
    <linearGradient id="orangeBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="100%" stop-color="#FF8C33" />
    </linearGradient>

    <!-- Dark bar gradient (售价) -->
    <linearGradient id="darkBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </linearGradient>

    <!-- Absorbed cost bar gradient -->
    <linearGradient id="absorbedBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FF8C33" stop-opacity="0.25" />
    </linearGradient>

    <!-- Subtle radial glow behind quote -->
    <radialGradient id="quoteGlow" cx="0.35" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.06" />
      <stop offset="60%" stop-color="#FF6900" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0" />
    </radialGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <!-- Soft glow for orange text -->
    <filter id="orangeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Left accent bar gradient -->
    <linearGradient id="accentBarGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="50%" stop-color="#FF8C33" />
      <stop offset="100%" stop-color="#FF6900" />
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1280" height="720" fill="url(#bgGradient)" />
  <rect width="1280" height="720" fill="url(#quoteGlow)" />

  <!-- Subtle grid texture lines -->
  <line x1="0" y1="200" x2="1280" y2="200" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
  <line x1="0" y1="520" x2="1280" y2="520" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
  <line x1="640" y1="0" x2="640" y2="720" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="url(#accentBarGradient)" />

  <!-- ==================== HEADER ==================== -->
  <!-- Section label -->
  <text x="60" y="42" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="700" letter-spacing="2">PART 2 / 全系标配</text>

  <!-- Page number -->
  <text x="1220" y="42" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.2" text-anchor="end" letter-spacing="1">06 / 12</text>

  <!-- Decorative dot pattern top-right -->
  <g fill="#FF6900" fill-opacity="0.06">
    <circle cx="1180" cy="62" r="2" />
    <circle cx="1196" cy="62" r="2" />
    <circle cx="1212" cy="62" r="2" />
    <circle cx="1228" cy="62" r="2" />
    <circle cx="1180" cy="78" r="2" />
    <circle cx="1196" cy="78" r="2" />
    <circle cx="1212" cy="78" r="2" />
    <circle cx="1228" cy="78" r="2" />
  </g>

  <!-- ==================== TITLE ==================== -->
  <text x="60" y="92" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" letter-spacing="2">成本加<tspan fill="#FF6900">2万</tspan>，售价只加<tspan fill="#FF6900">4千</tspan></text>

  <!-- Title accent underline -->
  <rect x="60" y="106" width="100" height="3" rx="1.5" fill="#FF6900" />

  <!-- ==================== QUOTE BLOCK (Hero Bento Card) ==================== -->
  <rect x="40" y="136" width="1200" height="140" rx="16" fill="#FFFFFF" fill-opacity="0.04" filter="url(#cardShadow)" />
  <rect x="40" y="136" width="1200" height="140" rx="16" fill="none" stroke="#FF6900" stroke-opacity="0.2" stroke-width="1" />

  <!-- Orange left accent strip on card -->
  <rect x="40" y="136" width="5" height="140" rx="2.5" fill="#FF6900" />

  <!-- Decorative large quotation mark — opening -->
  <text x="72" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="100" fill="#FF6900" fill-opacity="0.2" font-weight="700">"</text>

  <!-- Quote text -->
  <text x="136" y="216" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="3">我们不想让用户超预算</text>

  <!-- Decorative large quotation mark — closing -->
  <text x="688" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="100" fill="#FF6900" fill-opacity="0.2" font-weight="700">"</text>

  <!-- Quote attribution -->
  <text x="136" y="254" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.4" letter-spacing="2">— 雷军，新一代小米SU7发布会</text>

  <!-- ==================== LEFT BENTO CARD: Cost vs Price Bars ==================== -->
  <rect x="40" y="300" width="700" height="310" rx="16" fill="#FFFFFF" fill-opacity="0.04" filter="url(#cardShadow)" />
  <rect x="40" y="300" width="700" height="310" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" />

  <!-- Card corner accent -->
  <path d="M 40 320 L 40 300 Q 40 300 56 300 L 110 300" fill="none" stroke="#FF6900" stroke-width="2.5" stroke-linecap="round" />

  <!-- Card title -->
  <text x="72" y="340" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="1">成本 vs 售价变化</text>
  <text x="260" y="340" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.3" letter-spacing="1">COST vs PRICE DELTA</text>

  <!-- Divider -->
  <rect x="72" y="354" width="636" height="1" fill="#FFFFFF" fill-opacity="0.06" />

  <!-- Bar 1: 物料成本增加 +20,000 (full width = 100% reference) -->
  <text x="72" y="390" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.6" font-weight="500">物料成本增加</text>
  <rect x="72" y="400" width="576" height="38" rx="8" fill="url(#orangeBar)" />
  <text x="92" y="425" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" fill="#FFFFFF" letter-spacing="1">+20,000 元</text>

  <!-- Bar 2: 售价增加 +4,000 (4/20 = 20% width) -->
  <text x="72" y="466" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.6" font-weight="500">售价增加</text>
  <rect x="72" y="476" width="115" height="38" rx="8" fill="url(#darkBar)" />
  <text x="92" y="501" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" fill="#1A1A1A" letter-spacing="1">+4,000 元</text>

  <!-- Bar 3: 小米承担 ~16,000 (16/20 = 80% width) -->
  <text x="72" y="540" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FF6900" fill-opacity="0.8" font-weight="600">小米承担差额</text>
  <rect x="72" y="550" width="461" height="38" rx="8" fill="url(#absorbedBar)" stroke="#FF6900" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="6,4" />
  <text x="92" y="575" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" fill="#FF6900" letter-spacing="1">~16,000 元 / 台</text>

  <!-- ==================== RIGHT BENTO CARD: vs Tesla Model 3 ==================== -->
  <rect x="760" y="300" width="480" height="180" rx="16" fill="#FF6900" fill-opacity="0.08" filter="url(#cardShadow)" />
  <rect x="760" y="300" width="480" height="180" rx="16" fill="none" stroke="#FF6900" stroke-opacity="0.2" stroke-width="1" />

  <!-- Card title -->
  <text x="792" y="336" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#FF6900" letter-spacing="1">vs Tesla Model 3</text>

  <!-- Divider -->
  <rect x="792" y="348" width="416" height="1" fill="#FF6900" fill-opacity="0.15" />

  <!-- Price comparison: SU7 -->
  <rect x="792" y="364" width="192" height="88" rx="12" fill="#FF6900" fill-opacity="0.15" stroke="#FF6900" stroke-opacity="0.3" stroke-width="1" />
  <text x="888" y="393" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FF6900" font-weight="600" text-anchor="middle" letter-spacing="1">小米SU7 Standard</text>
  <text x="888" y="434" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="900" fill="#FF6900" text-anchor="middle" filter="url(#orangeGlow)">21.99<tspan font-size="18" font-weight="600">万</tspan></text>

  <!-- VS label -->
  <text x="1012" y="420" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.3" text-anchor="middle" font-weight="700">vs</text>

  <!-- Price comparison: Tesla -->
  <rect x="1040" y="364" width="172" height="88" rx="12" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" />
  <text x="1126" y="393" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.4" font-weight="500" text-anchor="middle" letter-spacing="1">Tesla Model 3</text>
  <text x="1126" y="434" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="900" fill="#FFFFFF" fill-opacity="0.35" text-anchor="middle">23.55<tspan font-size="18" font-weight="600">万</tspan></text>

  <!-- ==================== RIGHT BOTTOM CARD: Savings callout ==================== -->
  <rect x="760" y="500" width="480" height="110" rx="16" fill="#FFFFFF" fill-opacity="0.04" filter="url(#cardShadow)" />
  <rect x="760" y="500" width="480" height="110" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" />

  <!-- Savings amount -->
  <text x="792" y="545" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.5" font-weight="500">比 Model 3 便宜</text>

  <text x="792" y="582" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="900" fill="#FF6900" filter="url(#orangeGlow)" letter-spacing="1">15,600<tspan font-size="18" font-weight="600" dx="4">元</tspan></text>

  <!-- Plus config badge -->
  <rect x="1044" y="555" width="172" height="40" rx="10" fill="#FF6900" fill-opacity="0.12" stroke="#FF6900" stroke-opacity="0.25" stroke-width="1" />
  <text x="1130" y="580" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#FF6900" text-anchor="middle" letter-spacing="1">+ 配置更高</text>

  <!-- ==================== BOTTOM INFO BAR ==================== -->
  <rect x="40" y="634" width="1200" height="48" rx="12" fill="#FFFFFF" fill-opacity="0.03" />
  <rect x="40" y="634" width="1200" height="48" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />

  <!-- Key point 1 -->
  <circle cx="72" cy="658" r="3" fill="#FF6900" />
  <text x="86" y="663" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.4" font-weight="400">单车物料成本增加约20,000元，终端售价仅上调4,000元</text>

  <!-- Separator -->
  <line x1="545" y1="644" x2="545" y2="672" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" />

  <!-- Key point 2 -->
  <circle cx="568" cy="658" r="3" fill="#FF6900" />
  <text x="582" y="663" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.4" font-weight="400">预售价再降10,000元：上市价低于预期</text>

  <!-- ==================== FOOTER ==================== -->
  <text x="60" y="706" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.15" letter-spacing="1">XIAOMI SU7 | 新一代小米SU7发布会</text>
</svg>