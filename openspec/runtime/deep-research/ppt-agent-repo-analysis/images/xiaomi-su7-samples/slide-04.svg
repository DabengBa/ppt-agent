<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <!-- Elevated card shadow -->
    <filter id="cardShadowLift" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <!-- Glow for accent elements -->
    <filter id="accentGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FF6900" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for charging bar -->
    <linearGradient id="chargeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6900"/>
      <stop offset="100%" stop-color="#FF8C38"/>
    </linearGradient>
    <!-- Subtle background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F2F2F2"/>
    </linearGradient>
    <!-- Feature card hover gradient -->
    <linearGradient id="featureCardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <!-- Dark accent gradient for right column header area -->
    <linearGradient id="darkAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#FF6900"/>

  <!-- ==================== HEADER AREA ==================== -->
  <!-- Section label -->
  <text x="60" y="42" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#FF6900" font-weight="700" letter-spacing="2">PART 1 / 极致参数</text>

  <!-- Title -->
  <text x="60" y="82" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="800" fill="#1A1A1A" letter-spacing="1">蛟龙底盘 + 极速补能</text>

  <!-- Subtitle -->
  <text x="60" y="110" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#888888" letter-spacing="0.5">Dragon Chassis — 从悬架到制动的全面进化</text>

  <!-- Title accent line -->
  <rect x="60" y="122" width="80" height="3" rx="1.5" fill="#FF6900"/>

  <!-- ==================== LEFT COLUMN: DRAGON CHASSIS ==================== -->
  <!-- Main card container -->
  <rect x="40" y="148" width="580" height="520" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- Column header with icon -->
  <rect x="40" y="148" width="580" height="56" rx="16" fill="#FFFFFF"/>
  <rect x="40" y="188" width="580" height="16" fill="#FFFFFF"/>

  <!-- Dragon icon (inline SVG) -->
  <g transform="translate(64, 162)">
    <circle cx="14" cy="14" r="14" fill="#FFF0E0"/>
    <path d="M10 8 L18 14 L10 20 Z" fill="#FF6900"/>
  </g>

  <text x="100" y="180" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">蛟龙底盘配置</text>
  <text x="232" y="180" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#AAAAAA" font-weight="500">DRAGON CHASSIS</text>

  <!-- Feature Grid: 2 columns x 3 rows -->
  <!-- Row 1 -->
  <!-- Feature 1: Front Double Wishbone -->
  <rect x="60" y="212" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(76, 226)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <path d="M10 24 L18 12 L26 24" stroke="#FF6900" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="12" r="2.5" fill="#FF6900"/>
  </g>
  <text x="122" y="246" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">前双叉臂悬架</text>
  <text x="122" y="268" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">Double Wishbone</text>

  <!-- Feature 2: Rear 5-Link -->
  <rect x="340" y="212" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(356, 226)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <path d="M10 26 L14 14 L18 22 L22 14 L26 26" stroke="#FF6900" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="402" y="246" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">后五连杆悬架</text>
  <text x="402" y="268" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">5-Link Independent</text>

  <!-- Row 2 -->
  <!-- Feature 3: Air Spring -->
  <rect x="60" y="304" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(76, 318)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <ellipse cx="18" cy="18" rx="8" ry="12" stroke="#FF6900" stroke-width="2.5" fill="none"/>
    <line x1="18" y1="6" x2="18" y2="30" stroke="#FF6900" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <text x="122" y="338" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">双腔空气弹簧</text>
  <text x="122" y="360" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">Pro/Max 标配</text>

  <!-- Feature 4: CDC Adaptive -->
  <rect x="340" y="304" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(356, 318)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <path d="M10 18 Q14 10 18 18 Q22 26 26 18" stroke="#FF6900" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="402" y="338" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">CDC自适应减振</text>
  <text x="402" y="360" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">Adaptive Damping</text>

  <!-- Row 3 -->
  <!-- Feature 5: 4-Piston Brake -->
  <rect x="60" y="396" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(76, 410)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <circle cx="18" cy="18" r="10" stroke="#FF6900" stroke-width="2.5" fill="none"/>
    <circle cx="18" cy="18" r="4" fill="#FF6900"/>
  </g>
  <text x="122" y="430" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">四活塞制动卡钳</text>
  <text x="122" y="452" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">4-Piston Fixed Caliper</text>

  <!-- Feature 6: Staggered Tires -->
  <rect x="340" y="396" width="260" height="80" rx="12" fill="url(#featureCardBg)" stroke="#F0F0F0" stroke-width="1"/>
  <g transform="translate(356, 410)">
    <rect width="36" height="36" rx="8" fill="#FFF5EB"/>
    <circle cx="12" cy="20" r="6" stroke="#FF6900" stroke-width="2" fill="none"/>
    <circle cx="24" cy="20" r="8" stroke="#FF6900" stroke-width="2" fill="none"/>
  </g>
  <text x="402" y="430" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">245/265mm混搭轮胎</text>
  <text x="402" y="452" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#AAAAAA" font-weight="500">Staggered Setup</text>

  <!-- Smart features badges -->
  <rect x="60" y="496" width="540" height="44" rx="10" fill="#FFF8F2" stroke="#FFE0C0" stroke-width="1"/>
  <g transform="translate(76, 510)">
    <circle cx="8" cy="8" r="5" fill="#FF6900" opacity="0.15"/>
    <circle cx="8" cy="8" r="2.5" fill="#FF6900"/>
  </g>
  <text x="96" y="523" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#CC5500" font-weight="600">AI 湿滑路面检测</text>

  <g transform="translate(280, 510)">
    <circle cx="8" cy="8" r="5" fill="#FF6900" opacity="0.15"/>
    <circle cx="8" cy="8" r="2.5" fill="#FF6900"/>
  </g>
  <text x="300" y="523" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#CC5500" font-weight="600">防晕车模式</text>

  <!-- Bottom label for left column -->
  <text x="60" y="580" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC" letter-spacing="1">全系标配 — 旗舰级底盘架构</text>

  <!-- ==================== RIGHT COLUMN: FAST CHARGING ==================== -->
  <!-- Main card container with dark theme -->
  <rect x="660" y="148" width="580" height="520" rx="16" fill="url(#darkAccent)" filter="url(#cardShadowLift)"/>

  <!-- Column header -->
  <g transform="translate(688, 168)">
    <circle cx="14" cy="14" r="14" fill="rgba(255,105,0,0.2)"/>
    <path d="M12 8 L18 16 L14 16 L16 24 L10 16 L14 16 Z" fill="#FF6900"/>
  </g>
  <text x="724" y="186" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">极速补能</text>
  <text x="812" y="186" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" font-weight="500">MAX 专属</text>

  <!-- Big number: 5.2C -->
  <text x="688" y="278" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="88" font-weight="900" fill="#FF6900" filter="url(#accentGlow)" letter-spacing="-2">5.2C</text>
  <text x="688" y="306" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#888888" letter-spacing="2">充电倍率 CHARGING RATE</text>

  <!-- Divider -->
  <rect x="688" y="326" width="520" height="1" fill="#333333"/>

  <!-- Charging progress bar visual -->
  <text x="688" y="360" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#888888">充电进度</text>

  <!-- Progress bar background -->
  <rect x="688" y="374" width="520" height="36" rx="18" fill="#2A2A2A"/>

  <!-- Progress bar fill (10% to 80% = 70% of the bar) -->
  <!-- 10% mark starts at 688 + 52 = 740, 80% ends at 688 + 416 = 1104 -->
  <rect x="688" y="374" width="416" height="36" rx="18" fill="url(#chargeGradient)"/>

  <!-- Percentage labels on progress bar -->
  <text x="700" y="397" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">10%</text>
  <text x="1088" y="397" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">80%</text>

  <!-- Animated-look pulse dot at the fill edge -->
  <circle cx="1100" cy="392" r="6" fill="#FF6900" opacity="0.4"/>
  <circle cx="1100" cy="392" r="3" fill="#FFFFFF"/>

  <!-- 12 minutes stat -->
  <g transform="translate(688, 436)">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="-1">12</text>
    <text x="60" y="0" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">分钟</text>
    <text x="120" y="0" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#888888">10% → 80%</text>
  </g>

  <!-- Divider -->
  <rect x="688" y="456" width="520" height="1" fill="#333333"/>

  <!-- 15 minutes = 670km stat -->
  <g transform="translate(688, 498)">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="-1">15</text>
    <text x="60" y="0" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">分钟</text>
    <text x="120" y="-2" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#888888">= </text>
    <text x="138" y="-2" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="800" fill="#FF6900">670km</text>
    <text x="268" y="-2" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666">CLTC 补能</text>
  </g>

  <!-- 897V platform badge -->
  <rect x="688" y="530" width="520" height="46" rx="10" fill="rgba(255,105,0,0.08)" stroke="rgba(255,105,0,0.2)" stroke-width="1"/>
  <text x="708" y="558" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FF6900" font-weight="700">897V 超高压平台</text>
  <text x="860" y="558" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">SiC 碳化硅逆变器 | 全栈 800V 架构</text>

  <!-- Bottom label for right column -->
  <text x="688" y="610" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#555555" letter-spacing="1">MAX 车型专属配置</text>

  <!-- ==================== FOOTER ==================== -->
  <!-- Page number -->
  <text x="1220" y="700" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#BBBBBB" text-anchor="end" font-weight="500">04 / 12</text>

  <!-- Xiaomi logo text -->
  <text x="60" y="700" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#CCCCCC" letter-spacing="1">XIAOMI SU7 | 新一代小米SU7发布会</text>
</svg>