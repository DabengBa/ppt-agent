<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <!-- Primary orange gradient -->
    <linearGradient id="orangeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="100%" stop-color="#FF8C33" />
    </linearGradient>

    <!-- Dark background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#2A2A2A" />
    </linearGradient>

    <!-- Central radial glow — more prominent for closing impact -->
    <radialGradient id="glowGradient" cx="0.5" cy="0.38" r="0.45">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.10" />
      <stop offset="50%" stop-color="#FF6900" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0" />
    </radialGradient>

    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Softer card shadow for CTA cards -->
    <filter id="ctaShadow" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <!-- Orange glow for CTA button -->
    <filter id="btnGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#FF6900" flood-opacity="0.35" />
    </filter>

    <!-- Horizontal line gradient fade -->
    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0" />
      <stop offset="20%" stop-color="#FF6900" stop-opacity="1" />
      <stop offset="80%" stop-color="#FF6900" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0" />
    </linearGradient>

    <!-- Orange accent gradient for left bar -->
    <linearGradient id="accentBarGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6900" />
      <stop offset="50%" stop-color="#FF8C33" />
      <stop offset="100%" stop-color="#FF6900" />
    </linearGradient>

    <!-- Quote mark gradient -->
    <linearGradient id="quoteGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6900" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FF8C33" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- ========================================== -->
  <!-- BACKGROUND                                 -->
  <!-- ========================================== -->
  <rect width="1280" height="720" fill="url(#bgGradient)" />
  <rect width="1280" height="720" fill="url(#glowGradient)" />

  <!-- Subtle geometric grid lines for texture -->
  <line x1="0" y1="180" x2="1280" y2="180" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
  <line x1="320" y1="0" x2="320" y2="720" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
  <line x1="960" y1="0" x2="960" y2="720" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />

  <!-- LEFT ACCENT BAR -->
  <rect x="0" y="0" width="8" height="720" fill="url(#accentBarGradient)" />

  <!-- ========================================== -->
  <!-- TOP: Xiaomi brand badge + page indicator   -->
  <!-- ========================================== -->

  <!-- Brand badge -->
  <rect x="48" y="40" width="200" height="56" rx="12" fill="#FF6900" fill-opacity="0.12" />
  <rect x="48" y="40" width="200" height="56" rx="12" fill="none" stroke="#FF6900" stroke-opacity="0.25" stroke-width="1" />
  <rect x="64" y="52" width="32" height="32" rx="6" fill="#FF6900" />
  <text x="80" y="75" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Mi</text>
  <text x="112" y="74" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#FF6900" letter-spacing="2">XIAOMI</text>

  <!-- Page indicator -->
  <text x="1208" y="68" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" fill-opacity="0.2" text-anchor="end" letter-spacing="1">12 / 12</text>

  <!-- Decorative dot pattern (top-right) -->
  <g fill="#FF6900" fill-opacity="0.08">
    <circle cx="1180" cy="100" r="2" />
    <circle cx="1196" cy="100" r="2" />
    <circle cx="1212" cy="100" r="2" />
    <circle cx="1228" cy="100" r="2" />
    <circle cx="1180" cy="116" r="2" />
    <circle cx="1196" cy="116" r="2" />
    <circle cx="1212" cy="116" r="2" />
    <circle cx="1228" cy="116" r="2" />
  </g>

  <!-- ========================================== -->
  <!-- QUOTE SECTION — Hero area                  -->
  <!-- ========================================== -->

  <!-- Large decorative opening quotation mark -->
  <text x="168" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="700" fill="url(#quoteGradient)" text-anchor="middle">"</text>

  <!-- Quote text -->
  <text x="640" y="210" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="300" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle" letter-spacing="6">造车5年最新答卷</text>

  <!-- Large decorative closing quotation mark -->
  <text x="1112" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="700" fill="url(#quoteGradient)" text-anchor="middle">"</text>

  <!-- Attribution: Lei Jun -->
  <text x="640" y="252" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" fill-opacity="0.35" text-anchor="middle" letter-spacing="3">— 雷军</text>

  <!-- ========================================== -->
  <!-- MAIN HEADLINE                              -->
  <!-- ========================================== -->

  <!-- Fading horizontal divider -->
  <rect x="340" y="290" width="600" height="1" rx="0.5" fill="url(#lineGradient)" opacity="0.5" />

  <!-- Main CTA title -->
  <text x="640" y="358" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">新一代答卷，等你来评</text>

  <!-- Short orange accent bar beneath headline -->
  <rect x="592" y="378" width="96" height="4" rx="2" fill="url(#orangeGradient)" />

  <!-- ========================================== -->
  <!-- THREE CTA BENTO CARDS                      -->
  <!-- ========================================== -->

  <!-- Card 1: Test Drive -->
  <rect x="108" y="428" width="340" height="130" rx="16" fill="#FFFFFF" fill-opacity="0.04" filter="url(#ctaShadow)" />
  <rect x="108" y="428" width="340" height="130" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" />
  <!-- Orange top accent line -->
  <rect x="108" y="428" width="340" height="3" rx="1.5" fill="url(#orangeGradient)" />
  <!-- Small calendar icon -->
  <rect x="140" y="462" width="36" height="36" rx="8" fill="#FF6900" fill-opacity="0.15" />
  <text x="158" y="487" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FF6900" text-anchor="middle">20</text>
  <!-- Text content -->
  <text x="196" y="478" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#FF6900" letter-spacing="1">3月20日起</text>
  <text x="196" y="520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="2">全国试驾开放</text>

  <!-- Card 2: Delivery -->
  <rect x="470" y="428" width="340" height="130" rx="16" fill="#FFFFFF" fill-opacity="0.04" filter="url(#ctaShadow)" />
  <rect x="470" y="428" width="340" height="130" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" />
  <!-- Orange top accent line -->
  <rect x="470" y="428" width="340" height="3" rx="1.5" fill="url(#orangeGradient)" />
  <!-- Small delivery icon (box shape) -->
  <rect x="502" y="462" width="36" height="36" rx="8" fill="#FF6900" fill-opacity="0.15" />
  <text x="520" y="487" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#FF6900" text-anchor="middle">7d</text>
  <!-- Text content -->
  <text x="558" y="478" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="1">上市即交付</text>
  <text x="558" y="520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="2">最快一周提车</text>

  <!-- Card 3: Benefits Package -->
  <rect x="832" y="428" width="340" height="130" rx="16" fill="#FF6900" fill-opacity="0.08" filter="url(#ctaShadow)" />
  <rect x="832" y="428" width="340" height="130" rx="16" fill="none" stroke="#FF6900" stroke-opacity="0.2" stroke-width="1" />
  <!-- Orange top accent line -->
  <rect x="832" y="428" width="340" height="3" rx="1.5" fill="url(#orangeGradient)" />
  <!-- Small gift icon -->
  <rect x="864" y="462" width="36" height="36" rx="8" fill="#FF6900" fill-opacity="0.2" />
  <text x="882" y="487" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FF6900" text-anchor="middle">69K</text>
  <!-- Text content -->
  <text x="920" y="478" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#FF6900" letter-spacing="1">最高69,000元</text>
  <text x="920" y="520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="2">权益礼包</text>

  <!-- ========================================== -->
  <!-- CTA BUTTON                                 -->
  <!-- ========================================== -->
  <rect x="440" y="598" width="400" height="52" rx="26" fill="url(#orangeGradient)" filter="url(#btnGlow)" />
  <text x="640" y="631" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">预约试驾  xiaomi.com/su7</text>

  <!-- ========================================== -->
  <!-- BOTTOM BAR                                 -->
  <!-- ========================================== -->
  <rect x="48" y="676" width="1184" height="1" rx="0.5" fill="#FFFFFF" fill-opacity="0.06" />

  <!-- Bottom left: copyright / brand -->
  <text x="48" y="704" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" fill-opacity="0.2" letter-spacing="1">Xiaomi EV  |  2026</text>

  <!-- Bottom center: Xiaomi "Mi" logo mark -->
  <rect x="614" y="688" width="52" height="24" rx="4" fill="#FF6900" fill-opacity="0.15" />
  <rect x="614" y="688" width="52" height="24" rx="4" fill="none" stroke="#FF6900" stroke-opacity="0.3" stroke-width="0.5" />
  <text x="640" y="705" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="700" fill="#FF6900" text-anchor="middle" letter-spacing="1">Mi</text>

  <!-- Bottom right: tagline -->
  <text x="1232" y="704" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" fill-opacity="0.2" text-anchor="end" letter-spacing="1">新一代小米SU7</text>

</svg>