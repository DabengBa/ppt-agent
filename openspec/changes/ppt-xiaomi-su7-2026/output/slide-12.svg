<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="end-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2a4a7f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#end-bg)"/>
  <text x="640" y="160" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="48" font-weight="bold" fill="#ffffff">新一代小米SU7</text>
  <g transform="translate(180, 220)">
    <rect width="240" height="140" rx="12" fill="#ffffff" opacity="0.15"/>
    <text x="120" y="60" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="36" font-weight="bold" fill="#e67e22">902km</text>
    <text x="120" y="100" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ffffff" opacity="0.9">续航突破</text>
  </g>
  <g transform="translate(460, 220)">
    <rect width="240" height="140" rx="12" fill="#ffffff" opacity="0.15"/>
    <text x="120" y="60" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="36" font-weight="bold" fill="#e67e22">标配</text>
    <text x="120" y="100" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ffffff" opacity="0.9">高阶智驾</text>
  </g>
  <g transform="translate(740, 220)">
    <rect width="240" height="140" rx="12" fill="#ffffff" opacity="0.15"/>
    <text x="120" y="60" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="36" font-weight="bold" fill="#e67e22">9气囊</text>
    <text x="120" y="100" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ffffff" opacity="0.9">全面保护</text>
  </g>
  <g transform="translate(1020, 220)">
    <rect width="240" height="140" rx="12" fill="#ffffff" opacity="0.15"/>
    <text x="120" y="60" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="36" font-weight="bold" fill="#e67e22">22.99万</text>
    <text x="120" y="100" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ffffff" opacity="0.9">起超性价比</text>
  </g>
  <text x="640" y="480" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="#ffffff">小米汽车，让每个人享受科技的乐趣</text>
  <g transform="translate(540, 530)">
    <rect width="200" height="4" rx="2" fill="#e67e22"/>
  </g>
  <text x="640" y="600" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="18" fill="#ffffff" opacity="0.7">感谢观看</text>
