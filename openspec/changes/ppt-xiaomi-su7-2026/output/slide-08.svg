    <text x="270" y="80" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="36" font-weight="bold" fill="#ffffff">卡布里蓝</text>
    <text x="270" y="120" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="20" fill="#e67e22">新增配色</text>
    <text x="270" y="160" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="14" fill="#ffffff" opacity="0.7">源自意大利卡布里岛的浪漫蓝</text>
  </g>
  <g transform="translate(620, 100)">
    <rect width="600" height="200" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="300" y="80" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="24" font-weight="bold" fill="#1a365d">贯穿式光环尾灯</text>
    <text x="300" y="120" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#1a202c" opacity="0.7">夜间辨识度拉满</text>
  </g>
  <g transform="translate(60, 320)">
    <rect width="380" height="200" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="190" y="70" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="24" font-weight="bold" fill="#1a365d">可升降电动后扰流板</text>
    <text x="190" y="110" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="14" fill="#1a202c" opacity="0.7">高速行驶自动升起</text>
  </g>
  <g transform="translate(460, 320)">
    <rect width="380" height="200" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="190" y="70" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="24" font-weight="bold" fill="#1a365d">Alcantara材质</text>
