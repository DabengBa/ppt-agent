    <text x="180" y="110" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="14" fill="#1a202c" opacity="0.7">应用流转无感切换</text>
  </g>
  <g transform="translate(460, 310)">
    <rect width="740" height="190" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
