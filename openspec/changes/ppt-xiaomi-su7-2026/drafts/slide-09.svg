  <g transform="translate(60, 100)">
    <rect width="380" height="400" rx="12" fill="#1a365d"/>
    <text x="190" y="120" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="#ffffff">小米生态</text>
    <text x="190" y="170" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="48" font-weight="bold" fill="#e67e22">3亿+</text>
    <text x="190" y="210" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="16" fill="#ffffff" opacity="0.8">IoT设备连接</text>
  </g>
  <g transform="translate(460, 100)">
    <rect width="360" height="190" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="180" y="70" text-anchor="middle" font-family="DM Sans, 'PingFang SC', sans-serif" font-size="22" font-weight="bold" fill="#1a365d">智能家居互联</text>
    <text x="180" y="110" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="14" fill="#1a202c" opacity="0.7">回家模式自动开启</text>
  </g>
  <g transform="translate(840, 100)">
    <rect width="360" height="190" rx="12" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="1"/>
