    <text x="370" y="110" text-anchor="middle" font-family="Inter, 'PingFang SC', sans-serif" font-size="14" fill="#1a202c" opacity="0.7">手表、手环、音箱、耳机的全场景联动</text>
  </g>
  <text x="1220" y="700" font-family="Inter" font-size="12" fill="#1a202c" opacity="0.3">09</text>
