    更好看 · 更好开 · 更智能 · 更安全
  </text>
  
  <!-- Xiaomi logo -->
  <rect x="600" y="500" width="80" height="80" rx="8" fill="white" opacity="0.2"/>
  <text x="640" y="545" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="white">
    Mi
