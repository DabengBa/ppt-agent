<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好看：座舱焕新
  </text>
  
  <!-- Interior showcase -->
  <rect x="80" y="160" width="600" height="340" rx="16" fill="#1e293b"/>
  <text x="380" y="340" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">
    [ 座舱展示区 ]
  </text>
  
  <!-- Feature cards -->
  <g transform="translate(720, 160)">
    <rect x="0" y="0" width="500" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="40" font-family="sans-serif" font-size="18" fill="#FFB366">氛围灯</text>
    <text x="40" y="75" font-family="sans-serif" font-size="28" font-weight="bold" fill="white">3636mm 环绕</text>
  </g>
  
  <g transform="translate(720, 280)">
    <rect x="0" y="0" width="240" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="40" font-family="sans-serif" font-size="18" fill="#FFB366">主驾</text>
    <text x="40" y="75" font-family="sans-serif" font-size="28" font-weight="bold" fill="white">18向调节</text>
  </g>
  
  <g transform="translate(980, 280)">
    <rect x="0" y="0" width="240" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="40" font-family="sans-serif" font-size="18" fill="#FFB366">副驾</text>
    <text x="40" y="75" font-family="sans-serif" font-size="28" font-weight="bold" fill="white">零重力座椅</text>
  </g>
  
  <g transform="translate(720, 400)">
    <rect x="0" y="0" width="500" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="40" font-family="sans-serif" font-size="18" fill="#FFB366">材质</text>
    <text x="40" y="75" font-family="sans-serif" font-size="28" font-weight="bold" fill="white">100%软质包裹 | 5㎡ Alcantara</text>
  </g>
  
  <!-- Bottom features -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="360" height="80" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="white">座椅通风加热标配</text>
  </g>
  
  <g transform="translate(460, 540)">
    <rect x="0" y="0" width="360" height="80" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="white">前排按摩功能</text>
  </g>
  
  <g transform="translate(840, 540)">
    <rect x="0" y="0" width="380" height="80" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="white">暗夜黑/砂陶米新色</text>
  </g>
