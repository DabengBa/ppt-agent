<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好开：超长续航
  </text>
  
  <!-- Range comparison -->
  <g transform="translate(64, 180)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">Standard</text>
    <text x="40" y="120" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">720</text>
    <text x="40" y="160" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km</text>
    <text x="40" y="200" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">73kWh 磷酸铁锂</text>
    <text x="40" y="240" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">+20km vs 老款</text>
  </g>
  
  <g transform="translate(464, 180)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="#FF6900" opacity="0.3"/>
    <rect x="0" y="0" width="380" height="40" rx="16" fill="#FF6900"/>
    <text x="190" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">⭐ 同级最长</text>
    <text x="40" y="80" font-family="sans-serif" font-size="18" fill="#FFB366">Pro</text>
    <text x="40" y="150" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">902</text>
    <text x="40" y="190" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km</text>
    <text x="40" y="230" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">96.3kWh 磷酸铁锂</text>
    <text x="40" y="270" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">+72km vs 老款 | 首破900km</text>
  </g>
  
  <g transform="translate(864, 180)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">Max</text>
    <text x="40" y="120" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">835</text>
    <text x="40" y="160" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km</text>
    <text x="40" y="200" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">101.7kWh 三元锂</text>
    <text x="40" y="240" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">+35km vs 老款</text>
  </g>
  
  <!-- Energy efficiency -->
  <g transform="translate(64, 500)">
    <rect x="0" y="0" width="1152" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="55" font-family="sans-serif" font-size="24" fill="white">能耗低至 11.7kWh/100km | 能量效率 94%</text>
  </g>
  
  <!-- Bottom note -->
  <g transform="translate(64, 630)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">CLTC标准 | Pro版可从容从北京开到南京而无需中途充电</text>
  </g>
</svg>