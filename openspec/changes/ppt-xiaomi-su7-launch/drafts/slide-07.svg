<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好开：极速充电
  </text>
  
  <!-- Voltage platform -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="600" height="200" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">高压平台</text>
    <text x="40" y="100" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Standard/Pro: 752V</text>
    <text x="40" y="150" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">Max: 897V</text>
  </g>
  
  <g transform="translate(700, 160)">
    <rect x="0" y="0" width="520" height="200" rx="16" fill="#FF6900" opacity="0.3"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">Max版充电倍率</text>
    <text x="40" y="120" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">5.2C</text>
    <text x="40" y="170" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">最高充电倍率</text>
  </g>
  
  <!-- Charging speed -->
  <g transform="translate(64, 400)">
    <rect x="0" y="0" width="380" height="180" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">10%-80%时间</text>
    <text x="40" y="110" font-family="sans-serif" font-size="56" font-weight="bold" fill="white">12</text>
    <text x="40" y="150" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">分钟 (Max)</text>
  </g>
  
  <g transform="translate(464, 400)">
    <rect x="0" y="0" width="380" height="180" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">15分钟补能</text>
    <text x="40" y="110" font-family="sans-serif" font-size="56" font-weight="bold" fill="white">670</text>
    <text x="40" y="150" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km (Max)</text>
  </g>
  
  <g transform="translate(864, 400)">
    <rect x="0" y="0" width="380" height="180" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">快充对比</text>
    <text x="40" y="100" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Standard: +450km/15min</text>
    <text x="40" y="130" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Pro: +490km/15min</text>
    <text x="40" y="160" font-family="sans-serif" font-size="20" fill="white">Max: +670km/15min</text>
  </g>
  
  <!-- Bottom note -->
  <g transform="translate(64, 620)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">全系碳化硅高压平台 | 告别400V时代 | 充电如同加油</text>
  </g>
</svg>