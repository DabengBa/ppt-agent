<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好看：设计焕新
  </text>
  
  <!-- Car silhouette placeholder -->
  <rect x="80" y="160" width="500" height="300" rx="16" fill="#1e293b"/>
  <text x="330" y="320" text-anchor="middle" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">
    [ 车型展示区 ]
  </text>
  
  <!-- Specs cards -->
  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="600" height="140" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">车身尺寸</text>
    <text x="40" y="90" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">4997 × 1963 × 1440mm</text>
    <text x="40" y="120" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">轴距 3000mm | C级豪华轿车</text>
  </g>
  
  <g transform="translate(620, 320)">
    <rect x="0" y="0" width="280" height="140" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">车身颜色</text>
    <text x="40" y="90" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">9款</text>
    <text x="40" y="120" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">3款新色首发</text>
  </g>
  
  <g transform="translate(940, 320)">
    <rect x="0" y="0" width="280" height="140" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">轮毂</text>
    <text x="40" y="90" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">6款</text>
    <text x="40" y="120" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">19-21寸可选</text>
  </g>
  
  <!-- Color palette -->
  <g transform="translate(80, 500)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">新色：卡普里蓝 | 赤霞红 | 翠绿</text>
  </g>
</svg>