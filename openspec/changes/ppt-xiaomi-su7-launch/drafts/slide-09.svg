<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更智能：XLA认知大模型
  </text>
  
  <!-- XLA Architecture -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="1152" height="200" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">XLA 架构</text>
    <text x="40" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">X: 端到端大模型</text>
    <text x="400" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">L: 语言模型 + MiMo具身</text>
    <text x="850" y="100" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">A: 拟人执行</text>
    <text x="40" y="160" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">从"数据驱动"迈入"认知驱动"新范式</text>
  </g>
  
  <!-- Capabilities -->
  <g transform="translate(64, 400)">
    <rect x="0" y="0" width="560" height="220" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">核心能力</text>
    <text x="40" y="100" font-family="sans-serif" font-size="22" fill="white">• 首次打通辅助驾驶和具身机器人</text>
    <text x="40" y="140" font-family="sans-serif" font-size="22" fill="white">• 引入多模态输入</text>
    <text x="40" y="180" font-family="sans-serif" font-size="22" fill="white">• 复杂场景理解推理能力提升</text>
  </g>
  
  <g transform="translate(656, 400)">
    <rect x="0" y="0" width="560" height="220" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">体验提升</text>
    <text x="40" y="100" font-family="sans-serif" font-size="22" fill="white">• 决策更可控、更拟人</text>
    <text x="40" y="140" font-family="sans-serif" font-size="22" fill="white">• 行驶更安心、更从容</text>
    <text x="40" y="180" font-family="sans-serif" font-size="22" fill="white">• 全系标配，交付即搭载</text>
  </g>
</svg>