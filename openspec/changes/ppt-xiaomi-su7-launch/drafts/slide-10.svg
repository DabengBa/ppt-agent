<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好开：蛟龙底盘
  </text>
  
  <!-- Chassis hardware -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="1152" height="200" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">硬件配置</text>
    <text x="40" y="100" font-family="sans-serif" font-size="24" fill="white">前双叉臂 + 后五连杆独立悬架</text>
    <text x="40" y="140" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Pro/Max: 闭式双腔空气弹簧 + CDC阻尼可变减振器</text>
    <text x="40" y="180" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">前四活塞固定卡钳 | 265mm后宽胎</text>
  </g>
  
  <!-- Software features -->
  <g transform="translate(64, 400)">
    <rect x="0" y="0" width="560" height="200" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">智能功能</text>
    <text x="40" y="100" font-family="sans-serif" font-size="22" fill="white">• 湿滑路面AI多模态监测</text>
    <text x="40" y="140" font-family="sans-serif" font-size="22" fill="white">• 智能底盘预瞄抬升</text>
    <text x="40" y="180" font-family="sans-serif" font-size="22" fill="white">• 防滑协同控制系统</text>
  </g>
  
  <g transform="translate(656, 400)">
    <rect x="0" y="0" width="560" height="200" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">舒适体验</text>
    <text x="40" y="100" font-family="sans-serif" font-size="22" fill="white">• 晕车舒缓模式</text>
    <text x="40" y="140" font-family="sans-serif" font-size="22" fill="white">• 湿滑模式</text>
    <text x="40" y="180" font-family="sans-serif" font-size="22" fill="white">• 悬架高度可调 (-20mm ~ +30mm)</text>
  </g>
</svg>