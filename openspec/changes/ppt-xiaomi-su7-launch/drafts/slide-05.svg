<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更好开：性能表现
  </text>
  
  <!-- Main stats -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#1e293b"/>
    <text x="40" y="60" font-family="sans-serif" font-size="18" fill="#FFB366">0-100km/h</text>
    <text x="40" y="130" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">3.08</text>
    <text x="40" y="170" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">秒</text>
    <text x="40" y="210" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Max版</text>
  </g>
  
  <g transform="translate(464, 160)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#1e293b"/>
    <text x="40" y="60" font-family="sans-serif" font-size="18" fill="#FFB366">最高时速</text>
    <text x="40" y="130" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">265</text>
    <text x="40" y="170" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">km/h</text>
    <text x="40" y="210" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">极速表现</text>
  </g>
  
  <g transform="translate(864, 160)">
    <rect x="0" y="0" width="380" height="240" rx="16" fill="#1e293b"/>
    <text x="40" y="60" font-family="sans-serif" font-size="18" fill="#FFB366">Max功率</text>
    <text x="40" y="130" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">690</text>
    <text x="40" y="170" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">马力</text>
    <text x="40" y="210" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">V6s Plus电机</text>
  </g>
  
  <!-- Bottom specs -->
  <g transform="translate(64, 440)">
    <rect x="0" y="0" width="560" height="120" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="#FFB366">电机类型</text>
    <text x="40" y="90" font-family="sans-serif" font-size="24" fill="white">全系标配 V6s Plus 超级电机</text>
  </g>
  
  <g transform="translate(648, 440)">
    <rect x="0" y="0" width="560" height="120" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="#FFB366">最高转速</text>
    <text x="40" y="90" font-family="sans-serif" font-size="24" fill="white">22,000 rpm</text>
  </g>
  
  <!-- Power comparison -->
  <g transform="translate(64, 590)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Standard/Pro: 320马力 | Max: 690马力 (前后双电机四驱)</text>
  </g>
</svg>