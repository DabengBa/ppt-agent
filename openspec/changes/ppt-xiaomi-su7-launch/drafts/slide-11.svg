<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更安全：全方位防护
  </text>
  
  <!-- Passive safety -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="560" height="280" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">被动安全</text>
    <text x="40" y="100" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">9</text>
    <text x="40" y="140" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">个安全气囊（全系标配）</text>
    <text x="40" y="190" font-family="sans-serif" font-size="24" fill="white">2200MPa 小米超强钢</text>
    <text x="40" y="230" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">内嵌式防滚架: A柱→C柱</text>
    <text x="40" y="260" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">高强度钢+铝合金占比90.3%</text>
  </g>
  
  <!-- Battery safety -->
  <g transform="translate(656, 160)">
    <rect x="0" y="0" width="560" height="280" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">电池安全</text>
    <text x="40" y="100" font-family="sans-serif" font-size="24" fill="white">1500MPa 防刮底横梁</text>
    <text x="40" y="140" font-family="sans-serif" font-size="24" fill="white">SU7 Ultra同款防弹涂层</text>
    <text x="40" y="190" font-family="sans-serif" font-size="20" fill="#FFB366">耐刮擦提升10倍</text>
    <text x="40" y="220" font-family="sans-serif" font-size="20" fill="#FFB366">耐撕裂提升10倍</text>
    <text x="40" y="250" font-family="sans-serif" font-size="20" fill="#FFB366">耐穿刺提升13倍</text>
  </g>
  
  <!-- Safety redundancy -->
  <g transform="translate(64, 480)">
    <rect x="0" y="0" width="1152" height="120" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">安全冗余</text>
    <text x="40" y="90" font-family="sans-serif" font-size="24" fill="white">三重冗余车门把手: 车外机械拉手 + 门锁冗余备份电源 + 车内应急机械拉手</text>
  </g>
  
  <!-- Bottom note -->
  <g transform="translate(64, 630)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">电池包通过超1230项安全测试 | 热失控不扩散 | 提前符合新国标</text>
  </g>
</svg>