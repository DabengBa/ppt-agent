<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    更智能：HAD辅助驾驶
  </text>
  
  <!-- Hardware specs -->
  <g transform="translate(64, 160)">
    <rect x="0" y="0" width="560" height="320" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">硬件配置（全系标配）</text>
    <text x="40" y="100" font-family="sans-serif" font-size="24" fill="white">• 128线超广角激光雷达</text>
    <text x="40" y="140" font-family="sans-serif" font-size="24" fill="white">• 4D毫米波雷达</text>
    <text x="40" y="180" font-family="sans-serif" font-size="24" fill="white">• 11颗高清摄像头</text>
    <text x="40" y="220" font-family="sans-serif" font-size="24" fill="white">• 12颗超声波雷达</text>
    <text x="40" y="280" font-family="sans-serif" font-size="20" fill="#FFB366">探测距离: 200m | 360°覆盖</text>
  </g>
  
  <g transform="translate(656, 160)">
    <rect x="0" y="0" width="560" height="320" rx="16" fill="#FF6900" opacity="0.3"/>
    <text x="40" y="50" font-family="sans-serif" font-size="18" fill="#FFB366">算力芯片</text>
    <text x="40" y="110" font-family="sans-serif" font-size="56" font-weight="bold" fill="white">700</text>
    <text x="40" y="150" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">TOPS</text>
    <text x="40" y="200" font-family="sans-serif" font-size="20" fill="white">NVIDIA Thor-U</text>
    <text x="40" y="250" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">(老款508 TOPS，提升38%)</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(64, 520)">
    <rect x="0" y="0" width="1152" height="100" rx="16" fill="#1e293b"/>
    <text x="40" y="55" font-family="sans-serif" font-size="24" fill="white">Xiaomi HAD 端到端辅助驾驶 | 车位到车位领航 | ETC/闸机通行 | 窄路环岛通行</text>
  </g>
  
  <!-- Bottom note -->
  <g transform="translate(64, 650)">
    <text x="0" y="0" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">2年完成同行5-10年的路 | 首期投资57.9亿元 | 团队超1800人</text>
  </g>
</svg>