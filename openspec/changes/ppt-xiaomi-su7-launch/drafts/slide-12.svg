<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="64" y="100" font-family="sans-serif" font-size="42" font-weight="bold" fill="white">
    价格发布
  </text>
  
  <!-- Price cards -->
  <g transform="translate(64, 180)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#1e293b"/>
    <text x="40" y="60" font-family="sans-serif" font-size="18" fill="#FFB366">Standard</text>
    <text x="40" y="130" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">21.99</text>
    <text x="40" y="170" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">万元</text>
    <text x="40" y="220" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">720km续航</text>
    <text x="40" y="250" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">752V高压平台</text>
    <text x="40" y="280" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">320马力</text>
  </g>
  
  <g transform="translate(464, 180)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#FF6900" opacity="0.3"/>
    <rect x="0" y="0" width="380" height="40" rx="16" fill="#FF6900"/>
    <text x="190" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">推荐</text>
    <text x="40" y="80" font-family="sans-serif" font-size="18" fill="#FFB366">Pro</text>
    <text x="40" y="150" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">24.99</text>
    <text x="40" y="190" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">万元</text>
    <text x="40" y="240" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">902km续航 ⭐</text>
    <text x="40" y="270" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">752V高压平台</text>
    <text x="40" y="300" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">空悬+CDC可选</text>
  </g>
  
  <g transform="translate(864, 180)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#1e293b"/>
    <text x="40" y="60" font-family="sans-serif" font-size="18" fill="#FFB366">Max</text>
    <text x="40" y="130" font-family="sans-serif" font-size="64" font-weight="bold" fill="white">30.39</text>
    <text x="40" y="170" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">万元</text>
    <text x="40" y="220" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">835km续航</text>
    <text x="40" y="250" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">897V高压平台</text>
    <text x="40" y="280" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">690马力四驱</text>
  </g>
  
  <!-- Comparison -->
  <g transform="translate(64, 540)">
    <rect x="0" y="0" width="1152" height="80" rx="16" fill="#1e293b"/>
    <text x="40" y="50" font-family="sans-serif" font-size="20" fill="white">比特斯拉Model 3便宜5600元 | 续航更长 | 全系标配激光雷达</text>
  </g>
