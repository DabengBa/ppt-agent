<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新一代小米SU7发布会</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
  }

  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: var(--accent, #FF6900);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .header-title span { color: var(--accent, #FF6900); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  .slide-counter {
    background: rgba(255, 255, 255, 0.06);
    color: var(--accent, #FF6900);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  .mode-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .mode-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .mode-btn.active {
    background: var(--accent, #FF6900);
    border-color: var(--accent, #FF6900);
  }

  .gallery {
    padding: 80px 32px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .slide-card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .slide-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  }

  .slide-card .slide-number {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    color: var(--accent, #FF6900);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .slide-card .slide-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 32px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .slide-card:hover .slide-label { opacity: 1; }

  .slide-card object,
  .slide-card img {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    pointer-events: none;
  }

  .scroll-view {
    display: none;
    padding: 80px 0 40px;
  }

  .scroll-view.active { display: block; }

  .scroll-slide {
    max-width: 960px;
    margin: 0 auto 24px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .scroll-slide object { width: 100%; display: block; }

  .scroll-slide .scroll-number {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: var(--accent, #FF6900);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }

  .presentation {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
  }

  .presentation.active {
    display: flex;
    flex-direction: column;
  }

  .pres-toolbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 210;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(16px);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .presentation:hover .pres-toolbar { opacity: 1; }

  .pres-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .pres-btn:hover { background: rgba(255,255,255,0.2); }

  .pres-progress {
    flex: 1;
    max-width: 400px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .pres-progress-bar {
    height: 100%;
    background: var(--accent, #FF6900);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .pres-counter {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    text-align: center;
  }

  .pres-slide-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .pres-slide-container object {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 4px;
    box-shadow: 0 4px 60px rgba(0,0,0,0.5);
  }

  .pres-click-zone {
    position: fixed;
    top: 0;
    bottom: 60px;
    width: 50%;
    z-index: 205;
    cursor: pointer;
  }

  .pres-click-zone.left {
    left: 0;
    cursor: w-resize;
  }

  .pres-click-zone.right {
    right: 0;
    cursor: e-resize;
  }

  .kbd-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
  }

  .kbd-hint kbd {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }

  .notes-panel {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 0;
    right: 0;
    z-index: 220;
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 16px 32px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.8);
  }

  .notes-panel.active { display: block; }

  .notes-panel .notes-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent, #FF6900);
    margin-bottom: 8px;
  }

  .notes-panel .notes-label {
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">Mi</div>
    <div class="header-title"><span>新一代小米SU7</span> 发布会</div>
  </div>
  <div class="header-right">
    <span class="slide-counter" id="slideCounter"></span>
    <button class="mode-btn active" onclick="setMode('gallery')">Gallery</button>
    <button class="mode-btn" onclick="setMode('scroll')">Scroll</button>
    <button class="mode-btn" onclick="startPresentation(0)">Present</button>
  </div>
</div>

<div class="gallery" id="galleryView">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<div class="scroll-view" id="scrollView"></div>

<div class="presentation" id="presView">
  <div class="pres-click-zone left" onclick="presNav(-1)"></div>
  <div class="pres-click-zone right" onclick="presNav(1)"></div>
  <div class="pres-slide-container" id="presSlide"></div>
  <div class="notes-panel" id="notesPanel">
    <div class="notes-title">Speaker Notes</div>
    <div class="notes-label" id="notesContent"></div>
  </div>
  <div class="pres-toolbar">
    <button class="pres-btn" onclick="presNav(-1)">&#8592;</button>
    <div class="pres-progress"><div class="pres-progress-bar" id="presProgress"></div></div>
    <span class="pres-counter" id="presCounter"></span>
    <button class="pres-btn" onclick="presNav(1)">&#8594;</button>
    <button class="pres-btn" onclick="exitPresentation()">&#10005;</button>
  </div>
</div>

<div class="kbd-hint" id="kbdHint">
  <kbd>F</kbd> Fullscreen &nbsp; <kbd>P</kbd> Present &nbsp; <kbd>G</kbd> Gallery &nbsp; <kbd>S</kbd> Scroll &nbsp; <kbd>N</kbd> Notes
</div>

<script>
const SLIDES = [
  { "file": "slide-01.svg", "label": "封面 — 新一代小米SU7", "notes": { "talking_points": ["欢迎各位参加新一代小米SU7发布会", "今天我们将展示小米汽车的最新成果", "新一代SU7在安全、智能、性能、续航四大维度全面升级"], "transition_line": "让我们先来看看新一代SU7的市场表现", "timing_seconds": 60 } },
  { "file": "slide-02.svg", "label": "小米汽车的市场势能", "notes": { "talking_points": ["小米SU7上市21个月交付超36万辆", "2025年底首次超越特斯拉Model 3", "2026年目标交付55万辆"], "transition_line": "这些成绩离不开产品的不断进化，让我们看看新一代SU7做了哪些升级", "timing_seconds": 90 } },
  { "file": "slide-03.svg", "label": "更好看：设计焕新", "notes": { "talking_points": ["延续经典溜背轿跑造型，5米车长3米轴距", "9款车身颜色，3款新色首发", "6款轮毂选择，21寸锻造双层轮毂可选", "全新进气格栅设计，集成4D毫米波雷达"], "transition_line": "外观升级了，内饰更是焕然一新", "timing_seconds": 120 } },
  { "file": "slide-04.svg", "label": "更好看：座舱焕新", "notes": { "talking_points": ["新增暗夜黑、砂陶米两款新色", "100%软质材料包裹，5㎡ Alcantara材质", "3636mm环绕氛围灯（同级最长）", "18向电动调节主驾座椅", "123°零重力副驾座椅可选"], "transition_line": "接下来让我们看看新一代SU7的动力表现", "timing_seconds": 120 } },
  { "file": "slide-05.svg", "label": "更好开：性能表现", "notes": { "talking_points": ["全系标配V6s Plus超级电机", "Max版0-100km/h加速3.08秒", "最高时速265km/h", "最高转速22000rpm"], "transition_line": "性能强劲，续航更是同级领先", "timing_seconds": 90 } },
  { "file": "slide-06.svg", "label": "更好开：超长续航", "notes": { "talking_points": ["Standard版：720km续航", "Pro版：902km续航，同级最长", "Max版：835km续航", "能耗低至11.7kWh/100km"], "transition_line": "902km的续航是如何实现的？关键在于高压平台和高效电驱", "timing_seconds": 120 } },
  { "file": "slide-07.svg", "label": "更好开：极速充电", "notes": { "talking_points": ["全系碳化硅高压平台", "Standard/Pro版752V，Max版897V", "Max版最高5.2C充电倍率", "12分钟从10%充到80%", "15分钟补充670km续航"], "transition_line": "接下来介绍新一代SU7的核心亮点——智能驾驶系统", "timing_seconds": 120 } },
  { "file": "slide-08.svg", "label": "更智能：HAD辅助驾驶", "notes": { "talking_points": ["全系标配激光雷达", "700 TOPS算力（NVIDIA Thor-U）", "Xiaomi HAD端到端辅助驾驶系统", "2年完成同行5-10年的路"], "transition_line": "XLA认知大模型是本次升级的核心", "timing_seconds": 120 } },
  { "file": "slide-09.svg", "label": "更智能：XLA认知大模型", "notes": { "talking_points": ["XLA = 端到端大模型 + MiMo具身认知 + 动作专家", "首次打通辅助驾驶和具身机器人两大任务", "引入多模态输入", "提升复杂场景理解推理能力", "决策更可控、更拟人"], "transition_line": "接下来是新一代SU7最引以为傲的安全配置", "timing_seconds": 120 } },
  { "file": "slide-10.svg", "label": "更好开：蛟龙底盘", "notes": { "talking_points": ["小米自主研发的高性能智能底盘系统", "前双叉臂+后五连杆独立悬架", "双腔空气弹簧+CDC阻尼可变减振器", "软硬件深度融合", "湿滑路面AI多模态监测"], "transition_line": "底盘为操控打好基础，安全配置更是武装到牙齿", "timing_seconds": 120 } },
  { "file": "slide-11.svg", "label": "更安全：全方位防护", "notes": { "talking_points": ["全系标配9个安全气囊", "2200MPa小米超强钢内嵌式防滚架", "三重冗余车门把手设计", "电池包通过超1230项安全测试", "防弹涂层保护电池安全"], "transition_line": "安全配置行业领先，价格更是诚意十足", "timing_seconds": 120 } },
  { "file": "slide-12.svg", "label": "价格发布", "notes": { "talking_points": ["Standard版：21.99万元", "Pro版：24.99万元", "Max版：30.39万元", "全系标配激光雷达、700TOPS算力", "比特斯拉Model 3便宜5600元，续航更长"], "transition_line": "总结一下新一代SU7的核心优势", "timing_seconds": 120 } },
  { "file": "slide-13.svg", "label": "新一代SU7核心优势", "notes": { "talking_points": ["全系标配激光雷达+700TOPS算力+XLA认知大模型", "Pro版902km续航同级最长", "Max版12分钟快充+3.08秒加速", "9气囊+2200MPa超强钢全方位安全", "21.99万起，性价比之王"], "transition_line": "感谢各位的关注和支持", "timing_seconds": 90 } },
  { "file": "slide-14.svg", "label": "谢谢观看", "notes": { "talking_points": ["新一代小米SU7，新一代驾驶者之车", "更好看·更好开·更智能·更安全", "21.99万元起"], "transition_line": "", "timing_seconds": 30 } }
];

const TOTAL = SLIDES.length;
const ACCENT = '#FF6900';

document.documentElement.style.setProperty('--accent', ACCENT);
document.getElementById('slideCounter').textContent = `${TOTAL} slides`;

const galleryGrid = document.getElementById('galleryGrid');
SLIDES.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'slide-card';
  card.onclick = () => startPresentation(i);
  card.innerHTML = `
    <div class="slide-number">${String(i + 1).padStart(2, '0')}</div>
    <object data="${s.file}" type="image/svg+xml"></object>
    <div class="slide-label">${s.label}</div>
  `;
  galleryGrid.appendChild(card);
});

const scrollView = document.getElementById('scrollView');
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'scroll-slide';
  div.innerHTML = `
    <div class="scroll-number">${String(i + 1).padStart(2, '0')} / ${TOTAL}</div>
    <object data="${s.file}" type="image/svg+xml"></object>
  `;
  scrollView.appendChild(div);
});

let currentMode = 'gallery';
function setMode(mode) {
  currentMode = mode;
  document.getElementById('galleryView').style.display = mode === 'gallery' ? 'block' : 'none';
  document.getElementById('scrollView').className = mode === 'scroll' ? 'scroll-view active' : 'scroll-view';
  document.getElementById('kbdHint').style.display = (mode === 'gallery' || mode === 'scroll') ? 'block' : 'none';
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
  });
  if (mode !== 'presentation') {
    document.getElementById('presView').classList.remove('active');
  }
}

let presIndex = 0;

function startPresentation(index) {
  presIndex = index || 0;
  document.getElementById('presView').classList.add('active');
  document.getElementById('kbdHint').style.display = 'none';
  renderPresSlide();
}

function exitPresentation() {
  document.getElementById('presView').classList.remove('active');
  document.getElementById('kbdHint').style.display = 'block';
}

function presNav(dir) {
  presIndex = Math.max(0, Math.min(TOTAL - 1, presIndex + dir));
  renderPresSlide();
}

function renderPresSlide() {
  const container = document.getElementById('presSlide');
  const notesVisible = document.getElementById('notesPanel').classList.contains('active');
  const maxH = notesVisible ? 'calc(100vh - 260px)' : 'calc(100vh - 80px)';
  container.innerHTML = `<object data="${SLIDES[presIndex].file}" type="image/svg+xml" style="width:100%;max-height:${maxH};"></object>`;
  document.getElementById('presCounter').textContent = `${presIndex + 1} / ${TOTAL}`;
  document.getElementById('presProgress').style.width = `${((presIndex + 1) / TOTAL) * 100}%`;
  updateNotesContent();
}

let notesVisible = false;

function toggleNotes() {
  notesVisible = !notesVisible;
  document.getElementById('notesPanel').classList.toggle('active', notesVisible);
  renderPresSlide();
}

function updateNotesContent() {
  const panel = document.getElementById('notesContent');
  const slide = SLIDES[presIndex];
  if (slide.notes && slide.notes.talking_points) {
    let html = '<div style="margin-bottom:8px"><strong style="color:var(--accent)">Talking Points:</strong></div>';
    html += '<ul style="margin:0 0 12px 16px;padding:0">';
    slide.notes.talking_points.forEach(p => { html += '<li style="margin-bottom:4px">' + p + '</li>'; });
    html += '</ul>';
    if (slide.notes.transition_line) {
      html += '<div style="margin-bottom:4px"><strong style="color:var(--accent)">Transition:</strong> ' + slide.notes.transition_line + '</div>';
    }
    if (slide.notes.timing_seconds) {
      const min = Math.floor(slide.notes.timing_seconds / 60);
      const sec = slide.notes.timing_seconds % 60;
      html += '<div style="opacity:0.5">Time: ~' + min + 'm' + (sec > 0 ? sec + 's' : '') + '</div>';
    }
    panel.innerHTML = html;
  } else {
    panel.innerHTML = '<span style="opacity:0.5">' + slide.label + '</span>';
  }
}

document.addEventListener('keydown', (e) => {
  const pres = document.getElementById('presView').classList.contains('active');
  if (pres) {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); presNav(1); }
    else if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); presNav(-1); }
    else if (e.key === 'Escape') { exitPresentation(); }
    else if (e.key === 'n' || e.key === 'N') { toggleNotes(); }
    else if (e.key === 'Home') { presIndex = 0; renderPresSlide(); }
    else if (e.key === 'End') { presIndex = TOTAL - 1; renderPresSlide(); }
  } else {
    if (e.key === 'p' || e.key === 'P') startPresentation(0);
    else if (e.key === 'g' || e.key === 'G') setMode('gallery');
    else if (e.key === 's' || e.key === 'S') setMode('scroll');
    else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  }
});
</script>
</body>
</html>
