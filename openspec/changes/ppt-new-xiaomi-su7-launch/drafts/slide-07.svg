    <circle cx="126" cy="272" r="4" fill="#FF7A1A"/><text x="142" y="278" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">标准版 / Pro 版 752V，Max 版</tspan><tspan x="142" dy="+28.2">897V，Max 版 15 分钟最高补能 670km</tspan></text><circle cx="126" cy="349" r="4" fill="#FF7A1A"/><text x="142" y="355" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">前双叉臂、后五连杆、固定卡钳、265mm</tspan><tspan x="142" dy="+28.2">后宽胎，Pro/Max 进一步提供双腔空簧 + CDC</tspan></text><circle cx="126" cy="426" r="4" fill="#FF7A1A"/><text x="142" y="432" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">蛟龙底盘目标不是单纯赛道参数，而是同时兼顾精准、稳定、舒适和安全</tspan></text>
    <rect x="92" y="566" width="1096" height="72" rx="20" fill="#F8FAFC" stroke="#D7E0EC" stroke-width="2"/>
