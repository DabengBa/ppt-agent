    <text x="92" y="198" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="800" fill="#101B2A">补能与底盘：高压平台 + 蛟龙底盘，把技术感变成驾驶质感</text>
