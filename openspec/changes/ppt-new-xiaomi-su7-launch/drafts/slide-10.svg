    <text x="92" y="198" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="800" fill="#101B2A">安全体系：从车身、电池到门把手，把极端场景都考虑进去</text>
