    <circle cx="126" cy="272" r="4" fill="#FF7A1A"/><text x="142" y="278" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">车身安全升级到 2200MPa 小米超强钢、9</tspan><tspan x="142" dy="+28.2">安全气囊、内嵌式防滚架</tspan></text><circle cx="126" cy="349" r="4" fill="#FF7A1A"/><text x="142" y="355" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">电池包具备 17 层高压绝缘防护、1500MPa</tspan><tspan x="142" dy="+28.2">防刮底横梁与防弹涂层</tspan></text><circle cx="126" cy="426" r="4" fill="#FF7A1A"/><text x="142" y="432" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">门把手三重冗余设计 100% 满足 2027</tspan><tspan x="142" dy="+28.2">年新国标，是最易传播的安全记忆点</tspan></text>
