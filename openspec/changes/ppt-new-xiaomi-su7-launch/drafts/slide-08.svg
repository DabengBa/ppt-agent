    <text x="82" y="100" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#8CB6FF">DRAFT / PAGE 08</text>
    <text x="1188" y="100" text-anchor="end" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#42E8FF">two_column</text>
    <text x="92" y="198" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="800" fill="#101B2A">智能座舱：从‘能联动’升级到‘更像懂你的出行终端’</text>
