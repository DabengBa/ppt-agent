    <rect x="92" y="252" width="1096" height="288" rx="24" fill="#F3F6FA" stroke="#D7E0EC" stroke-width="2"/>
    <circle cx="126" cy="272" r="4" fill="#FF7A1A"/><text x="142" y="278" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">双 5G、Wi-Fi 7、UWB、内置</tspan><tspan x="142" dy="+28.2">ETC，电子电气架构完成全面升级</tspan></text><circle cx="126" cy="349" r="4" fill="#FF7A1A"/><text x="142" y="355" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">超级小爱支持深度车控、模糊语义导航、连续对话和车外语音控车</tspan></text><circle cx="126" cy="398" r="4" fill="#FF7A1A"/><text x="142" y="404" text-anchor="start" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#F3F7FB"><tspan x="142" dy="0">后排移动控制屏与人车家生态联动，让座舱更像小米智能生活的延伸</tspan></text>
    <rect x="92" y="566" width="1096" height="72" rx="20" fill="#F8FAFC" stroke="#D7E0EC" stroke-width="2"/>
    <text x="120" y="608" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#51667E">Transition Cue</text>
    <text x="300" y="608" font-family="Geist Sans, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#23354A">从座舱体验继续上探，进入用户更关注的辅助驾驶能力升级。</text>
